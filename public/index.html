<!DOCTYPE html>
<html lang="hy">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Justitia AI — Վարչական Որոշումների Համակարգ</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gov: { 50:'#f0f4f8',100:'#d9e2ec',200:'#bcccdc',300:'#9fb3c8',
                   400:'#829ab1',500:'#627d98',600:'#486581',700:'#334e68',
                   800:'#243b53',900:'#102a43' }
          }
        }
      }
    }
  </script>
  <style>
    *{box-sizing:border-box}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f4f8}
    .fade-in{animation:fadeIn .25s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
    .nav-link{transition:background .15s,color .15s}
    .nav-link.active{background:#243b53;color:#fff}
    .card{background:#fff;border-radius:.5rem;box-shadow:0 1px 3px rgba(0,0,0,.1)}
    .btn-primary{background:#334e68;color:#fff;padding:.55rem 1.25rem;border-radius:.375rem;font-weight:600;font-size:.875rem;cursor:pointer;transition:background .15s;border:none}
    .btn-primary:hover{background:#243b53}
    .btn-primary:disabled{background:#9fb3c8;cursor:not-allowed}
    .btn-secondary{background:#e2e8f0;color:#334e68;padding:.55rem 1.25rem;border-radius:.375rem;font-weight:600;font-size:.875rem;cursor:pointer;transition:background .15s;border:none}
    .btn-secondary:hover{background:#d9e2ec}
    .score-bar{height:.875rem;border-radius:9999px;transition:width .6s ease,background .6s ease}
    .spinner{border:3px solid #d9e2ec;border-top:3px solid #334e68;border-radius:50%;width:32px;height:32px;animation:spin .7s linear infinite;margin:0 auto}
    @keyframes spin{to{transform:rotate(360deg)}}
    .input{width:100%;border:1px solid #bcccdc;border-radius:.375rem;padding:.6rem .85rem;font-size:.9rem;color:#243b53;outline:none;transition:border .15s}
    .input:focus{border-color:#627d98;box-shadow:0 0 0 3px rgba(98,125,152,.15)}
    textarea.input{resize:vertical;min-height:90px}
    select.input{background:#fff}
    .badge{display:inline-flex;align-items:center;padding:.2rem .65rem;border-radius:9999px;font-size:.75rem;font-weight:600}
    .badge-green{background:#dcfce7;color:#166534}
    .badge-yellow{background:#fef9c3;color:#854d0e}
    .badge-red{background:#fee2e2;color:#991b1b}
    .badge-blue{background:#dbeafe;color:#1e40af}
    table{width:100%;border-collapse:collapse}
    th{text-align:left;padding:.7rem 1rem;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:#627d98;background:#f8fafc;border-bottom:1px solid #e2e8f0}
    td{padding:.8rem 1rem;font-size:.875rem;color:#334e68;border-bottom:1px solid #f0f4f8}
    tr:hover td{background:#f8fafc}
  </style>
</head>
<body>

<div id="app"></div>

<script>
// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
const S = {
  page: 'dashboard',
  user: { name: 'Ադմինիստրատոր', role: 'Ղեկավար' },
  cases: [],
  laws: [],
  stats: null,
  analysisResult: null,
  analysisForm: { case_type:'', description:'', additional_data:'' },
  caseFilter: { type:'', search:'' },
  loading: false,
  saving: false,
  error: null,
  successMsg: null,
};

// ═══════════════════════════════════════════════════════════
// ROUTER
// ═══════════════════════════════════════════════════════════
function navigate(page) {
  S.page = page;
  S.error = null;
  S.successMsg = null;
  if (page === 'dashboard') loadStats();
  if (page === 'history')   loadCases();
  if (page === 'laws')      loadLaws();
  render();
}

// ═══════════════════════════════════════════════════════════
// API
// ═══════════════════════════════════════════════════════════
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || 'Սխալ');
  return data;
}

async function loadStats()  { S.stats  = await api('GET', '/api/stats'); }
async function loadCases()  {
  const q = new URLSearchParams();
  if (S.caseFilter.type)   q.set('type',   S.caseFilter.type);
  if (S.caseFilter.search) q.set('search', S.caseFilter.search);
  S.cases = await api('GET', `/api/cases?${q}`);
}
async function loadLaws()   { S.laws   = await api('GET', '/api/laws'); }

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
function render() {
  document.getElementById('app').innerHTML = renderShell();
  attachEvents();
}

// ── Shell ──────────────────────────────────────────────────
function renderShell() {
  const pages = {
    dashboard: renderDashboard,
    'new-case': renderNewCase,
    history:   renderHistory,
    laws:      renderLaws,
  };
  const nav = [
    { id:'dashboard', icon:'⊞', label:'Գլխավոր' },
    { id:'new-case',  icon:'＋', label:'Նոր դեպք' },
    { id:'history',   icon:'≡',  label:'Պատմություն' },
    { id:'laws',      icon:'§',  label:'Օրենքների բազա' },
  ];

  return `
  <div class="flex h-screen overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-56 bg-gov-900 flex flex-col flex-shrink-0">
      <div class="px-5 py-5 border-b border-gov-700">
        <div class="flex items-center gap-2.5">
          <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center text-white font-bold text-sm flex-shrink-0">J</div>
          <div>
            <div class="text-white text-sm font-bold leading-tight">Justitia AI</div>
            <div class="text-gov-400 text-xs leading-tight">DSS v1.0</div>
          </div>
        </div>
      </div>
      <nav class="flex-1 py-3 px-2 space-y-0.5 overflow-y-auto">
        ${nav.map(n => `
          <button data-nav="${n.id}"
            class="nav-link w-full text-left px-3 py-2.5 rounded text-sm font-medium flex items-center gap-3 text-gov-300 hover:bg-gov-800 hover:text-white ${S.page === n.id ? 'active' : ''}">
            <span class="w-5 text-center text-base opacity-80">${n.icon}</span>${n.label}
          </button>`).join('')}
      </nav>
      <div class="px-4 py-4 border-t border-gov-700">
        <div class="text-gov-400 text-xs">${S.user.name}</div>
        <div class="text-gov-600 text-xs">${S.user.role}</div>
      </div>
    </aside>

    <!-- Main -->
    <div class="flex-1 flex flex-col overflow-hidden">
      <!-- Header -->
      <header class="bg-white border-b border-gov-100 px-6 py-3 flex items-center justify-between flex-shrink-0">
        <div>
          <h1 class="text-gov-800 font-bold text-base">${nav.find(n => n.id === S.page)?.label || ''}</h1>
          <p class="text-gov-400 text-xs">ՀՀ Վարչական Ընթացակարգի Օրենք · Հոդված 6, 7, 8</p>
        </div>
        <div class="flex items-center gap-3">
          <span class="text-xs bg-green-100 text-green-700 px-2 py-1 rounded font-medium">● Ակտիվ</span>
          <span class="text-gov-500 text-xs">${new Date().toLocaleDateString('hy-AM')}</span>
        </div>
      </header>

      <!-- Page content -->
      <main class="flex-1 overflow-y-auto p-6">
        <div class="fade-in">
          ${(pages[S.page] || renderDashboard)()}
        </div>
      </main>
    </div>
  </div>`;
}

// ── Dashboard ──────────────────────────────────────────────
function renderDashboard() {
  const st = S.stats;
  if (!st) return `<div class="flex justify-center py-16"><div class="spinner"></div></div>`;

  const scoreColor = st.avgScore >= 85 ? '#22c55e' : st.avgScore >= 65 ? '#f59e0b' : '#ef4444';

  return `
  <div class="space-y-6">
    <!-- Stats row -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
      ${statCard('Ընդամենը դեպք', st.total, 'text-gov-800', '≡')}
      ${statCard('Այսօր', st.today, 'text-blue-700', '+')}
      ${statCard('Հետևողականություն', st.avgScore + '%', 'text-green-700', '⊙')}
      ${statCard('Կիրառվող օրենքներ', '3', 'text-purple-700', '§')}
    </div>

    <!-- Two-col -->
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <!-- Case types chart -->
      <div class="card p-5">
        <h3 class="text-gov-700 font-bold text-sm uppercase tracking-wide mb-4">Դեպքերի տեսակներ</h3>
        <div class="space-y-3">
          ${(st.byType || []).map(r => {
            const pct = st.total > 0 ? Math.round((r.n / st.total) * 100) : 0;
            return `
            <div>
              <div class="flex justify-between text-xs text-gov-600 mb-1 font-medium">
                <span>${r.case_type}</span><span>${r.n} (${pct}%)</span>
              </div>
              <div class="w-full bg-gov-100 rounded-full h-2">
                <div class="bg-gov-600 h-2 rounded-full" style="width:${pct}%"></div>
              </div>
            </div>`;
          }).join('') || '<p class="text-gov-400 text-sm">Դեպքեր չկան</p>'}
        </div>
      </div>

      <!-- Consistency -->
      <div class="card p-5">
        <h3 class="text-gov-700 font-bold text-sm uppercase tracking-wide mb-4">Հետևողականության ցուցիչ</h3>
        <div class="flex items-center justify-center py-4">
          <div class="text-center">
            <div class="text-6xl font-bold mb-2" style="color:${scoreColor}">${st.avgScore}%</div>
            <div class="text-gov-500 text-sm">Ամբողջ բազայի միջին</div>
            <div class="mt-4 text-xs text-gov-400 max-w-xs">
              Հոդված 7-ի պահանջով՝ նմանատիպ դեպքերը ստանում են նույն արդյունքը։
              ${st.avgScore >= 85 ? '<span class="text-green-600 font-semibold">Կատարյալ հետևողականություն ✓</span>' :
                st.avgScore >= 65 ? '<span class="text-yellow-600 font-semibold">Բավարար հետևողականություն</span>' :
                '<span class="text-red-600 font-semibold">Ուշադրություն — ցածր հետևողականություն</span>'}
            </div>
          </div>
        </div>
        <div class="w-full bg-gray-200 rounded-full h-3">
          <div class="score-bar" style="width:${st.avgScore}%;background:${scoreColor}"></div>
        </div>
        <div class="flex justify-between text-xs text-gov-400 mt-1"><span>0%</span><span>50%</span><span>100%</span></div>
      </div>
    </div>

    <!-- Quick actions -->
    <div class="card p-5">
      <h3 class="text-gov-700 font-bold text-sm uppercase tracking-wide mb-4">Արագ գործողություններ</h3>
      <div class="flex flex-wrap gap-3">
        <button data-nav="new-case" class="btn-primary">+ Նոր դեպք ավելացնել</button>
        <button data-nav="history" class="btn-secondary">Դեպքերի ցուցակ</button>
        <button data-nav="laws" class="btn-secondary">Օրենքների բազա</button>
      </div>
    </div>

    <!-- Legal reminder -->
    <div class="bg-gov-900 rounded-lg p-5 text-gov-200 text-xs leading-relaxed">
      <div class="font-bold text-gov-300 uppercase tracking-wide mb-2 text-xs">Իրավական հիշեցում</div>
      <span class="text-gov-300">Հոդված 6</span> — Ընտրիր օրենքով թույլատրված տարբերակ, ապահովի հավասարություն եւ համաչափություն։ &nbsp;
      <span class="text-gov-300">Հոդված 7</span> — Նմանատիպ դեպք = նմանատիպ որոշում, այլ ընտրություն՝ գրավոր հիմնավոր։ &nbsp;
      <span class="text-gov-300">Հոդված 8</span> — Որոշումը լինի անհրաժեշտ, նպատակային եւ չափավոր։
    </div>
  </div>`;
}

function statCard(label, value, cls, icon) {
  return `
  <div class="card p-5">
    <div class="flex items-center justify-between mb-2">
      <span class="text-gov-500 text-xs uppercase tracking-wide font-semibold">${label}</span>
      <span class="text-gov-300 text-lg">${icon}</span>
    </div>
    <div class="text-3xl font-bold ${cls}">${value}</div>
  </div>`;
}

// ── New Case ───────────────────────────────────────────────
function renderNewCase() {
  const f = S.analysisForm;
  const r = S.analysisResult;

  return `
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

    <!-- LEFT: Form -->
    <div class="space-y-4">
      <div class="card p-6">
        <h2 class="text-gov-800 font-bold text-base uppercase tracking-wide mb-5 flex items-center gap-2">
          <span class="w-6 h-6 bg-gov-700 text-white rounded text-xs flex items-center justify-center font-bold">1</span>
          Դեպքի տվյալներ
        </h2>

        ${S.error ? `<div class="bg-red-50 border border-red-200 text-red-700 rounded p-3 text-sm mb-4">${S.error}</div>` : ''}
        ${S.successMsg ? `<div class="bg-green-50 border border-green-200 text-green-700 rounded p-3 text-sm mb-4">${S.successMsg}</div>` : ''}

        <form id="caseForm" class="space-y-4">
          <div>
            <label class="block text-xs font-semibold text-gov-600 uppercase tracking-wide mb-1.5">Դեպքի տեսակ *</label>
            <select class="input" id="f_case_type" required>
              <option value="">— Ընտրեք տեսակ —</option>
              <option value="Ճանապարհային խախտում"     ${f.case_type==='Ճանապարհային խախտում'?'selected':''}>Ճանապարհային խախտում</option>
              <option value="Բիզնես կանոնախախտում"     ${f.case_type==='Բիզնես կանոնախախտում'?'selected':''}>Բիզնես կանոնախախտում</option>
              <option value="Շինարարական խախտում"      ${f.case_type==='Շինարարական խախտում'?'selected':''}>Շինարարական խախտում</option>
              <option value="Աղմուկի կանոնախախտում"    ${f.case_type==='Աղմուկի կանոնախախտում'?'selected':''}>Աղմուկի կանոնախախտում</option>
              <option value="Բնապահպանական խախտում"    ${f.case_type==='Բնապահպանական խախտում'?'selected':''}>Բնապահպանական խախտում</option>
              <option value="Այլ"                       ${f.case_type==='Այլ'?'selected':''}>Այլ</option>
            </select>
          </div>

          <div>
            <label class="block text-xs font-semibold text-gov-600 uppercase tracking-wide mb-1.5">Դեպքի նկարագրություն *</label>
            <textarea class="input" id="f_description" placeholder="Նկարագրեք դեպքի հանգամանքները..." required>${f.description}</textarea>
          </div>

          <div>
            <label class="block text-xs font-semibold text-gov-600 uppercase tracking-wide mb-1.5">Լրացուցիչ տվյալներ</label>
            <textarea class="input" id="f_additional" placeholder="Կրկնվո՞ղ է, կա՞ն մեղմող հանգամանքներ, ժամ, վայր..." style="min-height:70px">${f.additional_data}</textarea>
          </div>

          <button type="submit" class="btn-primary w-full py-3" ${S.loading ? 'disabled' : ''}>
            ${S.loading ? '<span class="flex items-center justify-center gap-2"><span class="spinner" style="width:18px;height:18px;border-width:2px"></span>Վերլուծվում է...</span>' : '🤖 Վերլուծել AI-ով'}
          </button>
        </form>
      </div>
    </div>

    <!-- RIGHT: AI Results -->
    <div class="space-y-4">
      ${r ? renderAnalysisResult(r) : renderAnalysisPlaceholder()}
    </div>
  </div>`;
}

function renderAnalysisPlaceholder() {
  return `
  <div class="card p-10 text-center text-gov-400">
    <div class="text-5xl mb-3 opacity-20">⚖</div>
    <div class="text-sm font-medium">Լրացրեք ձախ կողմի ձևը և սեղմեք «Վերլուծել»</div>
    <div class="text-xs mt-2 text-gov-300">AI-ն կգտնի նմանատիպ նախադեպեր և կառաջարկի<br>Հոդված 6-8-ին համահունչ որոշում</div>
  </div>`;
}

function renderAnalysisResult(r) {
  const score = r.consistency_score || 0;
  const scoreColor = score >= 80 ? '#22c55e' : score >= 60 ? '#f59e0b' : '#ef4444';
  const scoreBadge = score >= 80
    ? '<span class="badge badge-green">Բարձր հետևողականություն</span>'
    : score >= 60
    ? '<span class="badge badge-yellow">Միջին հետևողականություն</span>'
    : '<span class="badge badge-red">Ցածր հետևողականություն</span>';

  const legalBasis = (() => {
    try { return JSON.parse(r.legal_basis || '[]'); }
    catch { return r.legal_basis || []; }
  })();

  return `
  <div class="card p-6">
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-gov-800 font-bold text-base uppercase tracking-wide flex items-center gap-2">
        <span class="w-6 h-6 bg-blue-600 text-white rounded text-xs flex items-center justify-center font-bold">AI</span>
        AI Արդյունք
      </h2>
      ${r.ai_powered ? '<span class="badge badge-blue">GPT-4o-mini</span>' : '<span class="badge" style="background:#f1f5f9;color:#64748b">Ավտոմատ</span>'}
    </div>

    ${r.note ? `<div class="bg-yellow-50 border border-yellow-200 text-yellow-800 rounded p-2.5 text-xs mb-4">${r.note}</div>` : ''}

    <!-- Decision -->
    <div class="bg-gov-50 border border-gov-200 rounded-lg p-4 mb-4">
      <div class="text-xs font-semibold text-gov-500 uppercase tracking-wide mb-1">Առաջարկվող որոշում</div>
      <div class="text-gov-900 font-bold text-lg">${r.decision}</div>
    </div>

    <!-- Explanation -->
    <div class="mb-4">
      <div class="text-xs font-semibold text-gov-500 uppercase tracking-wide mb-1.5">Հիմնավորում</div>
      <p class="text-gov-700 text-sm leading-relaxed">${r.explanation}</p>
    </div>

    <!-- Legal basis tags -->
    ${legalBasis.length ? `
    <div class="mb-4">
      <div class="text-xs font-semibold text-gov-500 uppercase tracking-wide mb-1.5">Իրավական հիմք</div>
      <div class="flex flex-wrap gap-2">${legalBasis.map(l => `<span class="badge badge-blue">${l}</span>`).join('')}</div>
    </div>` : ''}

    <!-- Consistency meter -->
    <div class="mb-4">
      <div class="flex justify-between items-center mb-1.5">
        <div class="text-xs font-semibold text-gov-500 uppercase tracking-wide">Հետևողականություն</div>
        <div class="flex items-center gap-2">${scoreBadge}<span class="font-bold text-sm" style="color:${scoreColor}">${score}%</span></div>
      </div>
      <div class="w-full bg-gray-200 rounded-full h-3">
        <div class="score-bar" style="width:${score}%;background:${scoreColor}"></div>
      </div>
    </div>

    <!-- Similar cases -->
    ${r.similar_cases?.length ? `
    <div class="mb-5">
      <div class="text-xs font-semibold text-gov-500 uppercase tracking-wide mb-2">Հայտնաբերված նմանատիպ դեպքեր (${r.similar_cases.length})</div>
      <div class="space-y-2 max-h-52 overflow-y-auto">
        ${r.similar_cases.map(c => `
          <div class="bg-gray-50 rounded p-3 text-xs text-gov-600 border border-gray-100">
            <div class="font-semibold text-gov-800 mb-0.5">${c.case_type} · ${c.description}</div>
            <div class="text-gov-500">${c.additional_data || ''}</div>
            <div class="text-blue-700 font-medium mt-1">→ ${c.decision}</div>
          </div>`).join('')}
      </div>
    </div>` : ''}

    <!-- Save button -->
    <button id="saveBtn" class="btn-primary w-full" ${S.saving ? 'disabled' : ''}>
      ${S.saving ? 'Պահպանվում է...' : '✓ Հաստատել եւ պահպանել'}
    </button>
  </div>`;
}

  <div class="space-y-4">
    <!-- Filters -->
    <div class="card p-4">
      <div class="flex flex-wrap gap-3 items-end">
        <div class="flex-1 min-w-48">
          <label class="block text-xs font-semibold text-gov-600 uppercase tracking-wide mb-1.5">Տեսակ</label>
          <select id="filterType" class="input">
            <option value="">Բոլոր տեսակները</option>
            ${['Ճանապարհային խախտում','Բիզնես կանոնախախտում','Շինարարական խախտում','Աղմուկի կանոնախախտում','Բնապահպանական խախտում','Այլ']

          </select>

          <label class="block text-xs font-semibold text-gov-600 uppercase tracking-wide mb-1.5">Որոնել</label>
          <input class="input" type="text" id="filterSearch" placeholder="Նկարագրություն, որոշում..." value="${S.caseFilter.search}" />
        </div>
        <button id="applyFilter" class="btn-primary">Կիրառել</button>
        <button id="clearFilter" class="btn-secondary">Մաքրել</button>

    </div>

    <!-- Table -->
    <div class="card overflow-hidden">
      <div class="px-5 py-3 border-b border-gov-100 flex items-center justify-between">
        <h3 class="text-gov-700 font-bold text-sm">Դեպքերի ցուցակ</h3>
        <span class="text-xs text-gov-400">${S.cases.length} դեպք</span>
      </div>
      ${S.cases.length === 0
        ? `<div class="p-10 text-center text-gov-400 text-sm">Դեպքեր չեն գտնվել</div>`
        : `<div class="overflow-x-auto">
          <table>
            <thead><tr>
              <th>#</th><th>Տեսակ</th><th>Նկարագրություն</th><th>Որոշում</th>
              <th>Հետևողականություն</th><th>Ամսաթիվ</th>
            </tr></thead>
            <tbody>
              ${S.cases.map(c => {
                const sc = c.consistency_score || 0;
                const scColor = sc >= 80 ? 'badge-green' : sc >= 60 ? 'badge-yellow' : 'badge-red';
                return `
                <tr>
                  <td class="text-gov-400 font-mono text-xs">${c.id}</td>
                  <td><span class="badge badge-blue text-xs">${c.case_type}</span></td>
                  <td class="max-w-xs"><div class="truncate text-gov-700" title="${c.description}">${c.description}</div>
                    ${c.additional_data ? `<div class="text-gov-400 text-xs truncate">${c.additional_data}</div>` : ''}
                  </td>
                  <td class="text-gov-800 font-medium max-w-xs"><div class="truncate" title="${c.decision}">${c.decision || '—'}</div></td>
                  <td><span class="badge ${scColor}">${sc}%</span></td>
                  <td class="text-gov-400 text-xs whitespace-nowrap">${new Date(c.created_at).toLocaleDateString('hy-AM')}</td>

// ── Laws ───────────────────────────────────────────────────
function renderLaws() {
  if (!S.laws.length) return `<div class="flex justify-center py-16"><div class="spinner"></div></div>`;

  const articleColors = { 'Հոդված 6': 'bg-purple-100 text-purple-800', 'Հոդված 7': 'bg-blue-100 text-blue-800', 'Հոդված 8': 'bg-green-100 text-green-800' };

  return `
  <div class="space-y-4">
    <div class="bg-gov-900 rounded-lg p-5 text-gov-200 text-sm leading-relaxed">
      <div class="text-gov-300 font-bold uppercase tracking-wide text-xs mb-1">ՀՀ Վարչական Ընթացակարգի Օրենք — ՀՕ-180</div>
      Ստորև ներկայացված են Justitia AI-ի հիմքում ընկած հիմնական հոդվածները։ Բոլոր AI առաջարկությունները ստուգվում են այս սկզբունքների դեմ։
    </div>

    ${S.laws.map(law => {
      const color = articleColors[law.article] || 'bg-gray-100 text-gray-800';
      return `
      <div class="card p-6">
        <div class="flex items-start gap-4">
          <div class="flex-shrink-0">
            <span class="inline-block px-3 py-1 rounded-full text-sm font-bold ${color}">${law.article}</span>
          </div>
          <div class="flex-1">
            <div class="flex items-center gap-3 mb-2">
              <h3 class="text-gov-800 font-bold text-base">${law.law_title}</h3>
              <span class="text-xs text-gov-400 font-mono">${law.law_number}</span>
            </div>
            <p class="text-gov-600 text-sm leading-relaxed mb-3">${law.description}</p>
            ${law.examples ? `
            <div class="bg-gov-50 rounded p-3">
              <div class="text-xs font-semibold text-gov-500 uppercase tracking-wide mb-1">Կիրառման օրինակներ</div>
              <p class="text-gov-600 text-xs">${law.examples}</p>
            </div>` : ''}
          </div>
        </div>
      </div>`;
    }).join('')}

    <div class="card p-5 border-l-4 border-blue-500">
      <h3 class="text-gov-800 font-bold text-sm mb-2">Ինչպե՞ս է Justitia AI-ն կիրառում այս հոդվածները</h3>
      <ul class="text-gov-600 text-sm space-y-1.5">
        <li>→ <strong>Հոդված 6:</strong> Ստուգում է, որ ընտրությունը լինի մարդու իրավունքներին հարգող</li>
        <li>→ <strong>Հոդված 7:</strong> Համեմատում է նախկին ${S.cases.length}+ դեպքերի հետ, ապահովում հետևողականություն</li>
        <li>→ <strong>Հոդված 8:</strong> Ստուգում է, որ պատժամիջոցը լինի անհրաժեշտ ու չափավոր</li>
      </ul>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════════════════
function attachEvents() {
  // Nav links (sidebar + quick actions)
  document.querySelectorAll('[data-nav]').forEach(btn => {
    btn.addEventListener('click', () => navigate(btn.dataset.nav));
  });

  // Case form
  document.getElementById('caseForm')?.addEventListener('submit', async e => {
    e.preventDefault();
    S.error = null;
    S.analysisForm = {
      case_type:       document.getElementById('f_case_type').value,
      description:     document.getElementById('f_description').value.trim(),
      additional_data: document.getElementById('f_additional').value.trim(),
    };
    if (!S.analysisForm.case_type || !S.analysisForm.description) {
      S.error = 'Դեպքի տեսակն ու նկարագրությունը պարտադիր են';
      render(); return;
    }
    S.loading = true;
    S.analysisResult = null;
    render();
    try {
      S.analysisResult = await api('POST', '/api/analyze', S.analysisForm);
    } catch (err) {
      S.error = err.message;
    }
    S.loading = false;
    render();
  });

  // Save button
  document.getElementById('saveBtn')?.addEventListener('click', async () => {
    if (!S.analysisResult || !S.analysisForm.case_type) return;
    S.saving = true;
    render();
    try {
      const lb = S.analysisResult.legal_basis;
      await api('POST', '/api/cases', {
        ...S.analysisForm,
        decision:          S.analysisResult.decision,
        explanation:       S.analysisResult.explanation,
        legal_basis:       Array.isArray(lb) ? lb : (lb ? [lb] : []),
        consistency_score: S.analysisResult.consistency_score || 0,
      });
      S.successMsg = '✓ Դեպքը հաջողությամբ պահպանվել է';
      S.analysisResult = null;
      S.analysisForm = { case_type:'', description:'', additional_data:'' };
    } catch (err) {
      S.error = err.message;
    }
    S.saving = false;
    render();
  });

  // History filters
  document.getElementById('applyFilter')?.addEventListener('click', async () => {
    S.caseFilter.type   = document.getElementById('filterType').value;
    S.caseFilter.search = document.getElementById('filterSearch').value.trim();
    await loadCases();
    render();
  });
  document.getElementById('clearFilter')?.addEventListener('click', async () => {
    S.caseFilter = { type:'', search:'' };
    await loadCases();
    render();
  });
}

// ═══════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════
render();
</script>
</body>
